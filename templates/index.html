<!DOCTYPE html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <main>
      <header>
        <div class="left-side">
          <p class="username">{{ session.get("ime") }} {{ session.get("prezime") }}</p>
          <img class="avatar" src="{{ url_for('static', filename='images/user-icon.png') }}" alt="Korisnik" />
        </div>
        <img class="icon" src="{{ url_for('static', filename='images/page_logo.png') }}" alt="Logo" />
      </header>

      <nav>
        <a href="{{ url_for('pocetna_stranica') }}">Pocetna</a>
        <a href="{{ url_for('prikazi_mjerenja') }}">Mjerenja</a>
        <a href="{{ url_for('prikazi_korisnike') }}">Korisnici</a>
        <a href="{{ url_for('logout') }}">Odjava</a>
      </nav>

      <section>
        <div class="panel">
          <h1>Spektrofotometar</h1>
          <h2>Novo mjerenje</h2>

          <form action="{{ url_for('pokreni_mjerenje') }}" method="POST">
            <label for="broj_kivete">Broj kivete</label>
            <input
              id="broj_kivete"
              name="broj_kivete"
              type="number"
              min="1"
              max="72"
              value="1"
              required
            />

            <input type="submit" value="Pokreni mjerenje" />
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
